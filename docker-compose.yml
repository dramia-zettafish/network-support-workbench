services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: tickets
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d tickets"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    volumes:
      - ./app:/app
    environment:
      DATABASE_URL: postgresql://user:password@db/tickets
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "cd /app && PYTHONPATH=/app alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  caddy:
    image: caddy:2-alpine
    ports:
      - "8080:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - ./app/static:/app/static:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
