version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: tickets
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/network_vcode_schema.sql:/docker-entrypoint-initdb.d/001_network_vcode_schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d tickets"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/tickets
    ports:
      - "3000:3000"
    command: npm run dev
    depends_on:
      db:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    ports:
      - "8080:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

